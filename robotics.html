<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamentals of Robot | CodeVerse Academy</title>
    <link rel="stylesheet" href="navigator.css">
    <style>
        .robot-scene {
            position: relative;
            height: 350px;
            background: #0f172a;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid #334155;
        }

        .robot-body {
            font-size: 6rem;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }

        .quiz-container {
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid #334155;
            border-radius: 24px;
            padding: 2rem;
            margin-top: 1rem;
            min-height: 300px;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1rem;
            margin-bottom: 0.8rem;
            background: #1e293b;
            border: 2px solid #334155;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
        }

        .option-btn:hover {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .option-btn.correct {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .option-btn.wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .drag-zone {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            min-height: 60px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 2px dashed #334155;
            flex-wrap: wrap;
        }

        .drop-zone {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #0f172a;
            border: 2px solid #ef4444;
            border-radius: 15px;
            min-height: 70px;
            margin-bottom: 1.5rem;
            align-items: center;
            justify-content: center;
        }

        .drag-item {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: grab;
            font-weight: bold;
            box-shadow: 0 4px 0 #991b1b;
            user-select: none;
        }

        .drag-item:active {
            cursor: grabbing;
        }
    </style>
</head>

<body>
    <div class="level-nav">
        <div class="container"
            style="display: flex; align-items: center; justify-content: space-between; height: 60px;">
            <div style="font-weight: 800; font-size: 1.2rem; color: #ef4444;">ROBOTICS <span
                    style="color: white;">LAB</span></div>
            <div style="display: flex; gap: 12px;" id="levelIndicators">
                <!-- level dots injected here -->
            </div>
            <a href="index.html"
                style="color: #64748b; text-decoration: none; font-size: 0.8rem; font-weight: 600; border: 1px solid #334155; padding: 4px 12px; border-radius: 20px;">EXIT
                LAB</a>
        </div>
    </div>

    <div class="navigator-layout" style="height: calc(100vh - 60px);">
        <!-- Quiz Section -->
        <div class="editor-panel">
            <h2 style="margin-bottom: 0.5rem; font-size: 1.4rem;" id="levelTitle">Level 1: What is a Robot?</h2>
            <p style="color: #94a3b8; font-size: 1rem; margin-bottom: 1.5rem;" id="levelDesc">
                Let's start with the basics!
            </p>

            <div class="quiz-container" id="quizContainer">
                <!-- Questions will be injected here -->
            </div>

            <div id="feedback" style="margin-top: 1rem; font-weight: bold; text-align: center; min-height: 1.5rem;">
            </div>
        </div>

        <!-- Visual Scene -->
        <div class="scene-panel">
            <div class="robot-scene">
                <div class="robot-body" id="robotHero">🤖</div>
                <!-- Some decorative elements -->
                <div style="position: absolute; bottom: 0; width: 100%; height: 20px; background: #1e293b;"></div>
            </div>

            <div style="margin-top: 2rem; padding: 2rem; background: rgba(30, 41, 59, 0.5); border-radius: 20px;">
                <h3 style="color: #ef4444; margin-bottom: 1rem;">Mission Log</h3>
                <div id="missionLog" style="font-family: 'Courier New', monospace; font-size: 0.9rem; color: #94a3b8;">
                    > System online...<br>
                    > Calibrating sensors...<br>
                    > Awaiting input...
                </div>
            </div>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="winModal"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px);">
        <div
            style="background: #1e293b; padding: 3rem; border-radius: 30px; text-align: center; border: 2px solid #ef4444; max-width: 500px;">
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">MISSION SUCCESS! 🤖</h1>
            <p style="color: #94a3b8; margin-bottom: 2rem;">You are now a certified Robotics Engineer!</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="run-btn" style="background: #334155;" onclick="location.href='dashboard.html'">Return to
                    Dashboard</button>
                <button class="run-btn" style="background: #ef4444;" onclick="nextLevel()">Next Level</button>
            </div>
        </div>
    </div>

    <script src="progress.js"></script>
    <script src="robotics.js"></script>
</body>

</html>
